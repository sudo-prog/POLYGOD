# POLYGOD Docker Compose - Hardened for zero-error startup with Qdrant for mem0

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: polygod-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - polygod_db:/app/polymarket.db
    ports:
      - "8000:8000"
    networks:
      - pnet
    depends_on:
      - qdrant
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: polygod-frontend:latest
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - pnet

  qdrant:  # For mem0 vector store
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - pnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s

  polygod-swarm:  # Parallel tournament + Lightning AI offload
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: polygod-swarm:latest
    restart: unless-stopped
    command: uv run python -m src.backend.polygod_graph
    env_file:
      - .env
    environment:
      - LIGHTNING_AI_TOKEN=${LIGHTNING_AI_TOKEN:-your_free_token}
      - COLAB_WEBHOOK_URL=${COLAB_WEBHOOK_URL:-}
    networks:
      - pnet
    depends_on:
      - backend
      - qdrant
    # NEW: proper healthcheck for a non-HTTP service
    healthcheck:
      test: ["CMD", "python", "-c", "import src.backend.polygod_graph; print('swarm ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - pnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  polygod_db:      # ← changed to directory volume (fixes SQLite)
  qdrant_data:

networks:
  pnet:
    driver: bridge
