# POLYGOD Production Deployment — Full production-ready stack
# Usage: docker compose -f docker-compose.prod.yml up --build -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build: .
    env_file: .env.prod
    restart: unless-stopped
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./checkpoints.db:/app/checkpoints.db
      - ./qdrant_storage:/app/qdrant_storage
    command: uvicorn src.backend.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  redis_data:
  qdrant_storage:
