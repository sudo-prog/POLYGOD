# POLYGOD Docker Compose - Hardened for zero-error startup with Qdrant for mem0

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: polygod-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - polygod_db:/app/polymarket.db
    ports:
      - "8000:8000"
    networks:
      - pnet
    depends_on:
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: polygod-frontend:latest
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - pnet

  qdrant:  # For mem0 vector store
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - pnet

volumes:
  polygod_db:
  qdrant_data:

networks:
  pnet:
    driver: bridge
