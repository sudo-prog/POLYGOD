# alembic.ini — Alembic configuration for POLYGOD
#
# Usage:
#   uv run alembic upgrade head       # apply all migrations
#   uv run alembic revision --autogenerate -m "add foo column"
#   uv run alembic downgrade -1
#   uv run alembic history --verbose
#   uv run alembic current
#
# The actual database URL is read from settings/env vars in alembic/env.py,
# not from the sqlalchemy.url line below (which serves as a last-resort
# fallback only).

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template for new migration file names: {rev}_{slug}.py
file_template = %%(rev)s_%%(slug)s

# Truncate the slug at 40 characters
truncate_slug_length = 40

# Timezone for "Generating ... " log messages
timezone = UTC

# Prepend sys.path with this comma-separated list before importing env.py
prepend_sys_path = .

# Fallback DB URL — overridden by env.py get_url() logic
# Override at runtime:  POLYGOD_DATABASE_URL=... uv run alembic upgrade head
sqlalchemy.url = sqlite+aiosqlite:///./polygod.db


# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
