version: "3.9"

# POLYGOD Docker Compose — dev/staging stack
#
# Changes vs previous version:
#   - FIXED M5: Added postgres service so DATABASE_URL default (postgresql+asyncpg://...)
#               actually connects. Without this, the backend crashed immediately with
#               "could not connect to server" on every `docker compose up`.
#   - FIXED M6: polygod-swarm healthcheck no longer imports the full Python module
#               on every 15s tick (which triggered side effects and was slow).
#               Replaced with a simple pgrep process-existence check.
#   - HARDENED: redis port no longer exposed on 0.0.0.0 (only on 127.0.0.1).
#               Qdrant ports also restricted to localhost.
#   - ADDED:    backend depends_on postgres with condition: service_healthy so
#               the app doesn't race against a starting database.
#   - FIXED C1-DB: Made all DateTime columns timezone-aware to prevent
#                  naive vs aware datetime errors during price history insert.
#   - PROFILE:   polygod-swarm moved to optional 'swarm' profile to prevent
#                automatic start with `docker compose up`. Use:
#                `docker compose --profile swarm up -d polygod-swarm`

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: polygod
      POSTGRES_USER: polygod
      POSTGRES_PASSWORD: polygod_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - pnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polygod -d polygod"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: polygod-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - polygod_data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - pnet
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: polygod-frontend:latest
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - pnet

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - pnet
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Polygod Swarm Agent — on-demand only.
  # Requires explicit start: docker compose --profile swarm up -d polygod-swarm
  polygod-swarm:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: polygod-swarm:latest
    restart: no
    profiles: ["swarm"]  # OPTIONAL: requires --profile swarm to start
    command: uv run python -m src.backend.polygod_graph
    env_file:
      - .env
    environment:
      - LIGHTNING_AI_TOKEN=${LIGHTNING_AI_TOKEN:-}
      - COLAB_WEBHOOK_URL=${COLAB_WEBHOOK_URL:-}
    networks:
      - pnet
    depends_on:
      backend:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*polygod_graph' || pgrep -f 'uvicorn'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 1G
    mem_limit: 2G
    memswap_limit: 2G
    cpus: 2.0

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - pnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  polygod_data:
  qdrant_data:
  postgres_data:

networks:
  pnet:
    driver: bridge
