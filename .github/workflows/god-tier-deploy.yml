name: GOD TIER Deploy
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false  # change to true + add secrets for real deploy
          tags: ghcr.io/${{ github.repository_owner }}/polygod:latest
      - name: Run GOD TIER tests
        run: docker compose up --build --exit-code-from backend