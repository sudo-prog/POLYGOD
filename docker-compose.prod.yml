# POLYGOD Production Deployment — Full production-ready stack
# Usage: docker compose -f docker-compose.prod.yml up --build -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_storage:/qdrant/storage

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: polygod
      POSTGRES_USER: polygod
      POSTGRES_PASSWORD: polygod_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env.prod
    restart: unless-stopped
    depends_on:
      - redis
      - qdrant
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints.db:/app/checkpoints.db
      - ./qdrant_storage:/app/qdrant_storage
    command: uv run uvicorn src.backend.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  redis_data:
  qdrant_storage:
  postgres_data:
