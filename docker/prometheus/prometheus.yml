# Prometheus configuration for POLYGOD

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'polygod-prod'
    environment: 'production'

scrape_configs:
  - job_name: 'polygod-backend'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
