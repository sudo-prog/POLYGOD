# POLYGOD Docker Compose — Production stack
#
# Usage:
#   docker compose -f docker-compose_prod.yml up -d
#   docker compose -f docker-compose_prod.yml logs -f
#   docker compose -f docker-compose_prod.yml down
#
# Requirements:
#   - Set all _SECRET variables in .env.prod
#   - Ensure DATABASE_URL points to production PostgreSQL
#   - Configure CORS_ORIGINS for your production domain

version: "3.9"

services:
  # ── PostgreSQL (production) ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polygod}
      POSTGRES_USER: ${POSTGRES_USER:-polygod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups  # for automated backups
    ports:
      - "127.0.0.1:5432:5432"  # localhost only
    networks:
      - pnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-polygod} -d ${POSTGRES_DB:-polygod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ── Backend (production) ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: polygod-backend:latest
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      - DEBUG=False
      - POLYGOD_MODE=0  # Start in OBSERVE mode, switch after validation
    volumes:
      - polygod_data:/app/data
    ports:
      - "127.0.0.1:8000:8000"  # localhost only - use nginx for SSL
    networks:
      - pnet
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # ── Frontend (static nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: polygod-frontend:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"  # localhost only - use nginx for SSL
    networks:
      - pnet

  # ── Qdrant (vector store) ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    networks:
      - pnet
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # ── Redis (caching) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - pnet
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ── Nginx (SSL termination + static files) ─────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro  # SSL certificates
    networks:
      - pnet
    depends_on:
      - backend
      - frontend

  # ── Prometheus (metrics) ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./docker/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - pnet

volumes:
  polygod_data:
  qdrant_data:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  pnet:
    driver: bridge
