
<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="AI-powered Polymarket intelligence terminal with real-time market tracking, TradingView charts, and live news feeds" />
    <title>POLYGOD - AI Market Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --pg-bg: #07080e;
            --pg-panel: rgba(12,18,35,0.72);
            --pg-gold: #c9a84c;
            --pg-green: #22c55e;
            --pg-red: #ef4444;
            --pg-ice: #7dd3fc;
            --pg-purple: #a78bfa;
            --radius-xl: 24px;
            --radius-lg: 20px;
            --radius-pill: 999px;
            --font-display: 'Newsreader', Georgia, serif;
            --font-body: 'Work Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        .pg-mesh-bg::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #07080e;
            background-image:
                radial-gradient(ellipse 80% 60% at 15% 20%, #0d3a5c 0%, transparent 55%),
                radial-gradient(ellipse 60% 50% at 85% 10%, #1a1060 0%, transparent 50%),
                radial-gradient(ellipse 50% 70% at 70% 80%, #0e2d5a 0%, transparent 55%),
                radial-gradient(ellipse 40% 40% at 30% 75%, #1e1050 0%, transparent 50%),
                radial-gradient(ellipse 70% 30% at 50% 50%, #081628 0%, transparent 60%);
        }
    </style>
</head>

<body class="pg-mesh-bg min-h-screen text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Color blind filters -->
    <svg style="display:none">
      <defs>
        <filter id="deuteranopia">
          <feColorMatrix type="matrix" values="0.625 0.375 0 0 0 0.700 0.300 0 0 0 0 0.300 0.700 0 0 0 0 0 1 0"/>
        </filter>
        <filter id="protanopia">
          <feColorMatrix type="matrix" values="0.567 0.433 0 0 0 0.558 0.442 0 0 0 0 0.242 0.758 0 0 0 0 0 1 0"/>
        </filter>
        <filter id="tritanopia">
          <feColorMatrix type="matrix" values="0.950 0.050 0 0 0 0 0.433 0.567 0 0 0 0.475 0.525 0 0 0 0 0 1 0"/>
        </filter>
      </defs>
    </svg>
</body>

</html>
